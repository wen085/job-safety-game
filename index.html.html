<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>求職安全翻翻樂</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');

  :root {
    --navy: #1a2e4a;
    --teal: #1d7a6b;
    --teal-light: #25a08e;
    --yellow: #f5c842;
    --yellow-light: #fde97a;
    --cream: #fdf8ef;
    --red: #e04040;
    --card-back: #1d7a6b;
    --card-front: #ffffff;
    --shadow: 0 4px 20px rgba(26,46,74,0.15);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--navy);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ── Header ── */
  header {
    width: 100%;
    background: var(--navy);
    padding: 18px 24px 12px;
    text-align: center;
    position: relative;
  }
  header .badge {
    display: inline-block;
    background: var(--yellow);
    color: var(--navy);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    padding: 3px 10px;
    border-radius: 20px;
    margin-bottom: 6px;
  }
  header h1 {
    color: #fff;
    font-size: 26px;
    font-weight: 900;
    letter-spacing: 1px;
  }
  header h1 span { color: var(--yellow); }

  /* ── Stats Bar ── */
  .stats {
    display: flex;
    gap: 16px;
    justify-content: center;
    padding: 10px 0 16px;
    flex-wrap: wrap;
  }
  .stat-box {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 12px;
    padding: 8px 20px;
    text-align: center;
    min-width: 90px;
  }
  .stat-box .label { color: rgba(255,255,255,0.55); font-size: 10px; letter-spacing: 1px; }
  .stat-box .value { color: var(--yellow); font-size: 22px; font-weight: 900; line-height: 1.2; }

  /* ── Game Wrapper ── */
  .game-wrapper {
    width: 100%;
    max-width: 680px;
    padding: 0 16px 32px;
  }

  /* ── Grid ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
  }

  /* ── Card ── */
  .card {
    aspect-ratio: 3/4;
    cursor: pointer;
    perspective: 800px;
    border-radius: 14px;
  }
  .card-inner {
    width: 100%; height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.45s cubic-bezier(.4,0,.2,1);
    border-radius: 14px;
  }
  .card.flipped .card-inner,
  .card.matched .card-inner { transform: rotateY(180deg); }

  .card-back, .card-front {
    position: absolute;
    inset: 0;
    border-radius: 14px;
    backface-visibility: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 10px;
    text-align: center;
  }

  .card-back {
    background: linear-gradient(135deg, var(--teal) 0%, #145c50 100%);
    border: 2px solid rgba(255,255,255,0.18);
    flex-direction: column;
    gap: 6px;
  }
  .card-back .icon { font-size: 28px; }
  .card-back .hint { color: rgba(255,255,255,0.6); font-size: 9px; letter-spacing: 1px; }

  .card-front {
    background: var(--cream);
    transform: rotateY(180deg);
    border: 2px solid var(--yellow);
    flex-direction: column;
    gap: 4px;
  }
  .card-front .card-label {
    font-size: 11px;
    color: var(--teal);
    font-weight: 700;
    letter-spacing: 0.5px;
    line-height: 1.4;
  }
  .card-front .card-icon { font-size: 22px; }

  .card.matched .card-front {
    background: linear-gradient(135deg, #e8fdf5, #c8f5e8);
    border-color: var(--teal-light);
  }
  .card.matched .card-inner { box-shadow: 0 0 16px rgba(29,122,107,0.5); }

  /* ── Modal ── */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(10,20,40,0.82);
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
    opacity: 0; pointer-events: none;
    transition: opacity 0.3s;
    padding: 20px;
  }
  .modal-overlay.show { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--cream);
    border-radius: 20px;
    max-width: 420px;
    width: 100%;
    overflow: hidden;
    transform: translateY(24px) scale(0.97);
    transition: transform 0.35s cubic-bezier(.4,0,.2,1);
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  }
  .modal-overlay.show .modal { transform: translateY(0) scale(1); }

  .modal-header {
    background: linear-gradient(135deg, var(--teal) 0%, #145c50 100%);
    padding: 20px 24px 16px;
    display: flex; align-items: center; gap: 12px;
  }
  .modal-header .modal-icon { font-size: 36px; }
  .modal-header h2 { color: #fff; font-size: 18px; font-weight: 900; line-height: 1.3; }

  .modal-body { padding: 20px 24px; }

  .speech-bubble {
    background: #fff;
    border: 2px solid var(--yellow);
    border-radius: 12px;
    padding: 12px 14px;
    margin-bottom: 14px;
    font-size: 13px;
    color: #444;
    line-height: 1.7;
    position: relative;
  }
  .speech-bubble::before {
    content: '💬';
    display: block;
    font-size: 16px;
    margin-bottom: 4px;
  }

  .reminder {
    background: linear-gradient(135deg, #fffbe6, #fff8d0);
    border-left: 4px solid var(--yellow);
    border-radius: 0 10px 10px 0;
    padding: 12px 14px;
    font-size: 13px;
    color: var(--navy);
    line-height: 1.7;
    font-weight: 500;
  }
  .reminder strong { color: var(--teal); font-weight: 700; }

  .modal-footer { padding: 0 24px 20px; }
  .btn-close {
    width: 100%;
    background: linear-gradient(135deg, var(--teal), var(--teal-light));
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 13px;
    font-size: 15px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    letter-spacing: 1px;
    transition: opacity 0.2s;
  }
  .btn-close:hover { opacity: 0.88; }

  /* ── Win Modal ── */
  .win-modal-header {
    background: linear-gradient(135deg, var(--yellow) 0%, #e8a800 100%);
    padding: 24px;
    text-align: center;
  }
  .win-modal-header .trophy { font-size: 52px; display: block; margin-bottom: 8px; }
  .win-modal-header h2 { color: var(--navy); font-size: 22px; font-weight: 900; }
  .win-modal-header p { color: rgba(26,46,74,0.7); font-size: 13px; margin-top: 4px; }

  .win-stats {
    display: flex; gap: 12px;
    padding: 16px 24px 0;
  }
  .win-stat {
    flex: 1;
    background: #fff;
    border: 2px solid #eee;
    border-radius: 12px;
    padding: 12px;
    text-align: center;
  }
  .win-stat .wlabel { font-size: 10px; color: #888; letter-spacing: 1px; }
  .win-stat .wvalue { font-size: 24px; font-weight: 900; color: var(--teal); }

  .win-video-section {
    padding: 12px 24px 0;
  }
  .win-video-label {
    font-size: 11px;
    color: #888;
    letter-spacing: 1px;
    text-align: center;
    margin-bottom: 8px;
  }
  .win-video-label span { color: var(--teal); font-weight: 700; }
  .video-wrapper {
    position: relative;
    width: 100%;
    padding-bottom: 56.25%;
    border-radius: 12px;
    overflow: hidden;
    background: #000;
  }
  .video-wrapper iframe {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border: none;
  }

  .win-body { padding: 16px 24px 20px; }
  .btn-lottery {
    width: 100%;
    background: linear-gradient(135deg, var(--yellow), #e8a800);
    color: var(--navy);
    border: none;
    border-radius: 12px;
    padding: 15px;
    font-size: 16px;
    font-weight: 900;
    font-family: inherit;
    cursor: pointer;
    letter-spacing: 1px;
    margin-bottom: 10px;
    transition: opacity 0.2s;
  }
  .btn-lottery:hover { opacity: 0.88; }
  .btn-replay {
    width: 100%;
    background: transparent;
    color: var(--teal);
    border: 2px solid var(--teal);
    border-radius: 12px;
    padding: 13px;
    font-size: 14px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.2s;
  }
  .btn-replay:hover { background: var(--teal); color: #fff; }

  /* ── Start Screen ── */
  #start-screen {
    position: fixed; inset: 0;
    background: var(--navy);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 200;
    padding: 32px;
    text-align: center;
  }
  #start-screen h1 { color: #fff; font-size: 30px; font-weight: 900; margin-bottom: 6px; }
  #start-screen h1 span { color: var(--yellow); }
  #start-screen p { color: rgba(255,255,255,0.6); font-size: 14px; line-height: 1.7; max-width: 320px; margin: 12px auto 24px; }
  .btn-start {
    background: linear-gradient(135deg, var(--yellow), #e8a800);
    color: var(--navy);
    border: none;
    border-radius: 14px;
    padding: 16px 48px;
    font-size: 18px;
    font-weight: 900;
    font-family: inherit;
    cursor: pointer;
    letter-spacing: 2px;
    box-shadow: 0 8px 24px rgba(245,200,66,0.4);
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .btn-start:hover { transform: translateY(-2px); box-shadow: 0 12px 30px rgba(245,200,66,0.5); }

  .card-preview {
    display: flex; gap: 10px; margin-bottom: 28px; flex-wrap: wrap; justify-content: center;
  }
  .preview-chip {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 20px;
    padding: 5px 12px;
    color: rgba(255,255,255,0.75);
    font-size: 11px;
    font-weight: 500;
  }

  @media (max-width: 480px) {
    .grid { grid-template-columns: repeat(4, 1fr); gap: 8px; }
    header h1 { font-size: 20px; }
  }
</style>
</head>
<body>

<!-- Start Screen -->
<div id="start-screen">
  <div style="font-size:56px; margin-bottom:12px;">🔍</div>
  <h1>求職安全<span>翻翻樂</span></h1>
  <p>翻開卡片，找到相同的求職警語配對！<br>完成所有配對，就能參加抽獎活動！</p>
  <div class="card-preview">
    <div class="preview-chip">💰 拒絕預付費用</div>
    <div class="preview-chip">🔒 保護個人隱私</div>
    <div class="preview-chip">📋 簽約前看仔細</div>
    <div class="preview-chip">📍 留意面試地點</div>
  </div>
  <button class="btn-start" onclick="startGame()">開始挑戰 ▶</button>
</div>

<!-- Header -->
<header>
  <div class="badge">桃園就業服務處 × 求職安全宣導</div>
  <h1>求職安全<span>翻翻樂</span></h1>
</header>

<div class="stats">
  <div class="stat-box">
    <div class="label">翻牌次數</div>
    <div class="value" id="flip-count">0</div>
  </div>
  <div class="stat-box">
    <div class="label">配對成功</div>
    <div class="value" id="match-count">0/8</div>
  </div>
  <div class="stat-box">
    <div class="label">時間</div>
    <div class="value" id="timer">00:00</div>
  </div>
</div>

<div class="game-wrapper">
  <div class="grid" id="grid"></div>
</div>

<!-- Info Modal -->
<div class="modal-overlay" id="info-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-icon" id="modal-icon">⚠️</div>
      <h2 id="modal-title">標題</h2>
    </div>
    <div class="modal-body">
      <div class="speech-bubble" id="modal-situation"></div>
      <div class="reminder" id="modal-reminder"></div>
    </div>
    <div class="modal-footer">
      <button class="btn-close" onclick="closeModal()">了解！繼續遊戲 →</button>
    </div>
  </div>
</div>

<!-- Win Modal -->
<div class="modal-overlay" id="win-modal">
  <div class="modal">
    <div class="win-modal-header">
      <span class="trophy">🏆</span>
      <h2>挑戰成功！</h2>
      <p>你已認識所有求職陷阱，保護自己！</p>
    </div>
    <div class="win-stats">
      <div class="win-stat">
        <div class="wlabel">翻牌次數</div>
        <div class="wvalue" id="final-flips">0</div>
      </div>
      <div class="win-stat">
        <div class="wlabel">完成時間</div>
        <div class="wvalue" id="final-time">00:00</div>
      </div>
    </div>
    <div class="win-video-section">
      <div class="win-video-label">🎬 看完影片更了解求職安全！<span>認識更多陷阱 →</span></div>
      <div class="video-wrapper">
        <iframe id="yt-player"
          src="https://www.youtube.com/embed/Yenv5EN1QzE?autoplay=1&mute=1&rel=0&modestbranding=1"
          allow="autoplay; encrypted-media"
          allowfullscreen>
        </iframe>
      </div>
    </div>
    <div class="win-body">
      <button class="btn-lottery" onclick="goLottery()">🎁 參加抽獎活動</button>
      <button class="btn-replay" onclick="replayGame()">↺ 再玩一次</button>
    </div>
  </div>
</div>

<script>
const CARDS = [
  {
    id: 1,
    label: '留意工作內容',
    icon: '💼',
    situation: '「高薪行政助理，月薪8萬元起，無經驗可，每日工時4小時，立即上班！」',
    reminder: '<strong>提醒你～</strong>天下沒有白吃的午餐，薪資過高、條件過於優渥的職缺要特別小心！應徵前務必多方查證公司資訊，確認工作內容與條件是否合理！'
  },
  {
    id: 2,
    label: '保護個人隱私',
    icon: '🔒',
    situation: '「面試後，公司要求先繳交3,000元保證金，報到後才會退還。」',
    reminder: '<strong>提醒你～</strong>合法公司絕對不會要求求職者繳交任何費用！遇到索取保證金、服裝費、材料費等情況，請立即拒絕並向主管機關檢舉！'
  },
  {
    id: 3,
    label: '簽約前看仔細',
    icon: '📋',
    situation: '「這份契約只是例行程序，不用看太仔細，先簽名就可以了。」',
    reminder: '<strong>提醒你～</strong>任何契約都要仔細閱讀後再簽署！若對方催促你快速簽名或拒絕讓你帶回審閱，這都是警訊，切勿輕易簽下任何文件！'
  },
  {
    id: 4,
    label: '留意面試地點',
    icon: '📍',
    situation: '「面試時間為凌晨2點，地點在汽車旅館，請勿告知任何人。」',
    reminder: '<strong>提醒你～</strong>正規公司的面試時間與地點都應公開透明！異常的面試時間、地點或要求保密，都是危險訊號，請拒絕並告知親友您的行蹤！'
  },
  {
    id: 5,
    label: '拒絕預付費用',
    icon: '💰',
    situation: '「因工作涉及金流管理，需要您提供良民證作為資格審查文件。」',
    reminder: '<strong>提醒你～</strong>良民證屬於個人敏感資料，雇主無權強制要求提供！遇到索取良民證、存摺或證件等情況，請提高警覺，避免個資遭到濫用！'
  },
  {
    id: 6,
    label: '婚育狀況免回答',
    icon: '🙅',
    situation: '「請問您目前有交往對象嗎？預計什麼時候結婚、生小孩？」',
    reminder: '<strong>提醒你～</strong>婚姻狀況、生育計畫屬於個人隱私，求職者沒有義務回答！雇主詢問與工作無關的私人問題，您有權拒絕，這也是法律保障的權益！'
  },
  {
    id: 7,
    label: '薪資要透明',
    icon: '📊',
    situation: '「徵才廣告僅寫『薪資面議』，實際薪資卻不到4萬元。」',
    reminder: '<strong>提醒你～</strong>依規定雇主刊登徵才廣告應明確標示薪資範圍！遇到薪資不透明的職缺，應徵前可先詢問清楚，保障自己的勞動權益！'
  },
  {
    id: 8,
    label: '拒絕性別歧視',
    icon: '⚖️',
    situation: '「誠徵送貨小弟、行政小姐、掃地阿姨。」',
    reminder: '<strong>提醒你～</strong>徵才廣告不得以性別為由限制應徵資格！帶有性別刻板印象的用語即屬違規，求職者可向地方主管機關申訴，捍衛平等就業的權利！'
  },
];

// State
let flippedCards = [];
let matchedPairs = 0;
let flipCount = 0;
let timerInterval = null;
let seconds = 0;
let lockBoard = false;
let pendingModalCard = null;
const LOTTERY_URL = 'https://forms.google.com'; // 替換為實際表單連結

function startGame() {
  document.getElementById('start-screen').style.display = 'none';
  startTimer();
}

function startTimer() {
  timerInterval = setInterval(() => {
    seconds++;
    const m = String(Math.floor(seconds / 60)).padStart(2, '0');
    const s = String(seconds % 60).padStart(2, '0');
    document.getElementById('timer').textContent = `${m}:${s}`;
  }, 1000);
}

function buildGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  // Take first 8 cards only (4x4 grid = 8 pairs)
  const pairs = [...CARDS.slice(0,8), ...CARDS.slice(0,8)];
  pairs.sort(() => Math.random() - 0.5);

  pairs.forEach((card, i) => {
    const el = document.createElement('div');
    el.className = 'card';
    el.dataset.id = card.id;
    el.dataset.index = i;
    el.innerHTML = `
      <div class="card-inner">
        <div class="card-back">
          <div class="icon">❓</div>
          <div class="hint">點擊翻牌</div>
        </div>
        <div class="card-front">
          <div class="card-icon">${card.icon}</div>
          <div class="card-label">${card.label}</div>
        </div>
      </div>`;
    el.addEventListener('click', () => flipCard(el, card));
    grid.appendChild(el);
  });
}

function flipCard(el, card) {
  if (lockBoard) return;
  if (el.classList.contains('flipped') || el.classList.contains('matched')) return;
  if (flippedCards.length === 2) return;

  el.classList.add('flipped');
  flippedCards.push({ el, card });
  flipCount++;
  document.getElementById('flip-count').textContent = flipCount;

  if (flippedCards.length === 2) {
    lockBoard = true;
    setTimeout(checkMatch, 800);
  }
}

function checkMatch() {
  const [a, b] = flippedCards;
  if (a.card.id === b.card.id) {
    a.el.classList.add('matched');
    b.el.classList.add('matched');
    matchedPairs++;
    document.getElementById('match-count').textContent = `${matchedPairs}/8`;
    flippedCards = [];
    lockBoard = false;
    showInfoModal(a.card);
  } else {
    setTimeout(() => {
      a.el.classList.remove('flipped');
      b.el.classList.remove('flipped');
      flippedCards = [];
      lockBoard = false;
    }, 600);
  }
}

function showInfoModal(card) {
  document.getElementById('modal-icon').textContent = card.icon;
  document.getElementById('modal-title').textContent = card.label;
  document.getElementById('modal-situation').innerHTML = card.situation;
  document.getElementById('modal-reminder').innerHTML = card.reminder;
  document.getElementById('info-modal').classList.add('show');
  pendingModalCard = card;
}

function closeModal() {
  document.getElementById('info-modal').classList.remove('show');
  if (matchedPairs === 8) {
    setTimeout(showWinModal, 400);
  }
}

function showWinModal() {
  clearInterval(timerInterval);
  const m = String(Math.floor(seconds / 60)).padStart(2, '0');
  const s = String(seconds % 60).padStart(2, '0');
  document.getElementById('final-flips').textContent = flipCount;
  document.getElementById('final-time').textContent = `${m}:${s}`;
  document.getElementById('win-modal').classList.add('show');
}

function goLottery() {
  window.open(LOTTERY_URL, '_blank');
}

function replayGame() {
  document.getElementById('win-modal').classList.remove('show');
  // 停止影片
  const iframe = document.getElementById('yt-player');
  if (iframe) iframe.src = iframe.src;
  flippedCards = [];
  matchedPairs = 0;
  flipCount = 0;
  seconds = 0;
  lockBoard = false;
  clearInterval(timerInterval);
  document.getElementById('flip-count').textContent = '0';
  document.getElementById('match-count').textContent = '0/8';
  document.getElementById('timer').textContent = '00:00';
  buildGrid();
  startTimer();
}

buildGrid();
</script>
</body>
